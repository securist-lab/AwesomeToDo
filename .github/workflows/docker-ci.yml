name: Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t awesometodo:latest .
    - name: Run container
      run: docker run -d -p 8080:80 awesometodo:latest
    - name: Run PHPUnit tests
      run: |
        docker-compose up -d
        docker-compose exec backend ./vendor/bin/phpunit tests