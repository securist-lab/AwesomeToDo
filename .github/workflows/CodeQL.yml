name: CodeQL Analysis
on:	 # mainブランチへPushされた際に jobs を実行
  push:
    branches: [main]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v2	# CodeQL初期化
        with:
          languages: javascript	# 分析対象のプログラミング言語を指定
      - uses: github/codeql-action/analyze@v2
		# CodeQLを使った分析を実行
