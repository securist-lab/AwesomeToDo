name: Test
on:
    push:
        branches:
            - main
    pull_request:
jobs:
    test:
        name: PHPUnit Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: php-actions/composer@v6
              with:
                php_version: '8.1'
            - uses: php-actions/phpunit@v3
              with:
                php_version: '8.1'
                args: "-d date.timezone=Asia/Tokyo"
                configuration: phpunit.xml