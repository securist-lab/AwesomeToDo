name: Docker Build and Push with Compose

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write   # GitHub Container Registry（GHCR）へのプッシュ権限
      contents: read    # リポジトリのコードを取得

    steps:
    - name: "Checkout code"
      uses: actions/checkout@v4

    # GHCR にログイン
    - name: "Login to GHCR"
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # メタデータの作成
    - name: "Create metadata"
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/securistant/awesometodo
        tags: |
          type=raw,value=latest
          type=sha,prefix=,suffix=,format=short

    # docker compose でビルドとプッシュを実行
    - name: "Build and Push with Docker Compose"
      run: |
        docker compose -f docker-compose.yml build
        docker tag awesometodo:latest ${{ steps.meta.outputs.tags }}
        docker push ${{ steps.meta.outputs.tags }}
