env:
  contexts:
  - name: 既定コンテキスト
    urls:
    - http://localhost:8000
    includePaths:
    - http://localhost:8000.*
    authentication:
      verification:
        method: response
        pollFrequency: 60
        pollUnits: requests
        pollUrl: ""
        pollPostData: ""
    sessionManagement:
      method: cookie
    technology: {}
    structure: {}
  parameters: {}
jobs:
- type: passiveScan-config
  parameters:
    maxAlertsPerRule: 0
    maxBodySizeInBytesToScan: 0
- name: import HAR File
  type: import
  parameters:
    type: har
    fileName: /root/AwesomeToDo.har
- type: passiveScan-wait
  parameters:
    maxDuration: 0
- type: activeScan
  parameters:
    context: 既定コンテキスト
    user: ""
    policy: ""
    maxRuleDurationInMins: 0
    maxScanDurationInMins: 0
    maxAlertsPerRule: 0
  policyDefinition:
    defaultStrength: medium
    defaultThreshold: medium
- type: report
  parameters:
    template: risk-confidence-html
    theme: original
    reportDir: ""
    reportFile: AwesomeToDo ZAP Report
    reportTitle: ZAP Scanning Report
    reportDescription: AwesomeToDo ZAP Report
    displayReport: false
  risks:
  - info
  - low
  - medium
  - high
  confidences:
  - falsepositive
  - low
  - medium
  - high
  - confirmed
  sections:
  - siteRiskCounts
  - responseBody
  - appendix
  - alertTypes
  - responseHeader
  - alertTypeCounts
  - riskConfidenceCounts
  - alerts
  - aboutThisReport
  - contents
  - requestBody
  - reportDescription
  - reportParameters
  - requestHeader
  - summaries

